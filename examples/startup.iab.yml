    state: "active"
    owner: abhisar-ceo
    steps:
      - id: metrics_collection
        name: "Gather Department KPIs"
        owner: product-agent
        channel: slack
        avg_duration_hours: 4
      - id: executive_review
        name: "Strategic Direction Realignment"
        owner: abhisar-ceo
        channel: email
        avg_duration_hours: 2

goals:
