workflows:
  - id: feature-development
    name: "Product Feature Delivery Workflow"
    description: "End-to-end sprint process from story writing to deployment"
    state: "active"
    owner: product-agent
    steps:
      - id: write_specs
        name: "Write Product Spec"
        owner: product-agent
        channel: slack
        avg_duration_hours: 2
      - id: build_code
        name: "Build and Test Code"
        owner: engineering-agent
        channel: github
        avg_duration_hours: 18
        threshold_hours: 24
      - id: code_review
        name: "Security & QA Review"
        owner: priya-cto
        channel: github
        avg_duration_hours: 4
        threshold_hours: 8
      - id: deploy
        name: "Production Deployment"
        owner: priya-cto
        channel: github
        avg_duration_hours: 0.5

  - id: lead-generation
    name: "B2B Outbound Lead Nurturing"
    description: "Prospect scouting and personalized cold email sequences"
    state: "active"
    owner: growth-agent
    steps:
