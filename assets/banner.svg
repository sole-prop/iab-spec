<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background:#090d16; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b13" />
      <stop offset="50%" stop-color="#0c1322" />
      <stop offset="100%" stop-color="#06090e" />
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b92b27" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    <linearGradient id="neonMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    <linearGradient id="neonEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Graphic Accents (Deep Background Glows) -->
  <circle cx="150" cy="200" r="120" fill="#0ea5e9" opacity="0.05" filter="blur(50px)"/>
  <circle cx="650" cy="200" r="140" fill="#a855f7" opacity="0.07" filter="blur(60px)"/>

  <!-- Outer Border -->
  <rect x="0.5" y="0.5" width="799" height="399" rx="8" fill="none" stroke="#1f2937" stroke-width="1" />

  <!-- ==================== LEFT PANEL: CODE EDITOR ==================== -->
  <g transform="translate(30, 40)">
    <!-- Glassmorphic Window Base -->
    <rect width="340" height="320" rx="8" fill="#0d1527" fill-opacity="0.8" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Window Header -->
    <path d="M0 8 A8 8 0 0 1 8 0 L332 0 A8 8 0 0 1 340 8 L340 30 L0 30 Z" fill="#0b0f19" stroke="#1e293b" stroke-width="0" />
    <circle cx="16" cy="15" r="4.5" fill="#f87171" />
    <circle cx="28" cy="15" r="4.5" fill="#fbbf24" />
    <circle cx="40" cy="15" r="4.5" fill="#34d399" />
    <text x="70" y="19" fill="#94a3b8" font-size="11" font-family="monospace">org.iab.yml — IaO Blueprint</text>
    
    <!-- Editor Code Block -->
    <g transform="translate(15, 50)" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="11.5" line-height="16">
      <!-- Line Numbers -->
      <g fill="#475569" text-anchor="end">
        <text x="15" y="16">1</text>
        <text x="15" y="32">2</text>
        <text x="15" y="48">3</text>
        <text x="15" y="64">4</text>
        <text x="15" y="80">5</text>
        <text x="15" y="96">6</text>
        <text x="15" y="112">7</text>
        <text x="15" y="128">8</text>
        <text x="15" y="144">9</text>
        <text x="15" y="160">10</text>
        <text x="15" y="176">11</text>
        <text x="15" y="192">12</text>
        <text x="15" y="208">13</text>
        <text x="15" y="224">14</text>
        <text x="15" y="240">15</text>
      </g>

      <!-- Code Text -->
      <g transform="translate(30, 0)">
        <text x="0" y="16"><tspan fill="#38bdf8">version</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#fb7185">"1.0"</tspan></text>
        <text x="0" y="32"><tspan fill="#38bdf8">organization</tspan><tspan fill="#94a3b8">:</tspan></text>
        <text x="0" y="48"><tspan fill="#38bdf8">  name</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#fb7185">"Sunrise Education Group"</tspan></text>
        <text x="0" y="64"><tspan fill="#38bdf8">  type</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#fb7185">"education"</tspan></text>
        
        <text x="0" y="88"><tspan fill="#38bdf8">agents</tspan><tspan fill="#94a3b8">:</tspan></text>
        <text x="0" y="104"><tspan fill="#38bdf8">  - id</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#34d399">admissions-agent</tspan></text>
        <text x="0" y="120"><tspan fill="#38bdf8">    role</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#fb7185">"AI Admissions Coordinator"</tspan></text>
        <text x="0" y="136"><tspan fill="#38bdf8">    owns</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#94a3b8">[</tspan><tspan fill="#34d399">admissions-workflow</tspan><tspan fill="#94a3b8">]</tspan></text>

        <text x="0" y="160"><tspan fill="#38bdf8">workflows</tspan><tspan fill="#94a3b8">:</tspan></text>
        <text x="0" y="176"><tspan fill="#38bdf8">  - id</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#34d399">admissions-workflow</tspan></text>
        <text x="0" y="192"><tspan fill="#38bdf8">    steps</tspan><tspan fill="#94a3b8">:</tspan></text>
        <text x="0" y="208"><tspan fill="#38bdf8">      - id</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#34d399">receive_application</tspan></text>
        <text x="0" y="224"><tspan fill="#38bdf8">        owner</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#34d399">admissions-agent</tspan></text>
        <text x="0" y="240"><tspan fill="#38bdf8">      - id</tspan><tspan fill="#94a3b8">:</tspan> <tspan fill="#34d399">principal_review</tspan> <tspan fill="#64748b"># Bottleneck ⚠</tspan></text>
      </g>
    </g>
  </g>

  <!-- ==================== RIGHT PANEL: TOPOLOGY GRAPH ==================== -->
  <g transform="translate(430, 40)">
    <!-- Graph Base Container -->
    <rect width="340" height="320" rx="8" fill="#0d1527" fill-opacity="0.8" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="20" y="30" fill="#f8fafc" font-size="12" font-weight="600" letter-spacing="0.5">COMPILED BLUEPRINT MODEL</text>
    
    <!-- Connection Lines (Dashed Glowing Paths) -->
    <!-- Organization to Agent -->
    <path d="M 170 85 L 75 160" stroke="#00f2fe" stroke-width="2" stroke-dasharray="4,4" opacity="0.8" />
    <!-- Organization to Human -->
    <path d="M 170 85 L 265 160" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,4" opacity="0.8" />
    <!-- Agent to Workflow -->
    <path d="M 75 160 L 75 250" stroke="#a855f7" stroke-width="2" opacity="0.8" filter="url(#glowPurple)" />
    <!-- Human to Workflow Step -->
    <path d="M 265 160 L 75 250" stroke="#fb923c" stroke-dasharray="3,3" stroke-width="1.5" opacity="0.6" />
    <!-- Workflow to Goal -->
    <path d="M 75 250 L 170 250" stroke="#34d399" stroke-width="2.5" opacity="0.8" filter="url(#glowEmerald)" />
    <!-- Goal to Organization -->
    <path d="M 170 250 L 170 85" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.5" />

    <!-- NODES -->
    <!-- 1. Root Node: Organization -->
    <g transform="translate(170, 85)">
      <circle r="22" fill="url(#bgGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#glowCyan)"/>
      <rect x="-10" y="-10" width="20" height="20" fill="none" />
      <!-- Building Icon inside -->
      <path d="M -6 6 L -6 -6 L 0 -9 L 6 -6 L 6 6 Z M -2 6 L -2 2 L 2 2 L 2 6 Z" fill="#00f2fe" stroke="#00f2fe" stroke-width="1" />
      <text x="0" y="38" fill="#e2e8f0" font-size="10.5" font-weight="600" text-anchor="middle">Organization</text>
    </g>

    <!-- 2. Agent Node -->
    <g transform="translate(75, 160)">
      <circle r="18" fill="url(#bgGrad)" stroke="#a855f7" stroke-width="2" filter="url(#glowPurple)"/>
      <!-- CPU/Brain Icon inside -->
      <rect x="-6" y="-6" width="12" height="12" rx="1.5" fill="none" stroke="#a855f7" stroke-width="1.5" />
      <line x1="-9" y1="-3" x2="-6" y2="-3" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="-9" y1="3" x2="-6" y2="3" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="6" y1="-3" x2="9" y2="-3" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="6" y1="3" x2="9" y2="3" stroke="#a855f7" stroke-width="1.5"/>
      <text x="0" y="32" fill="#cbd5e1" font-size="10" text-anchor="middle">AI Agent</text>
    </g>

    <!-- 3. Human Actor Node -->
    <g transform="translate(265, 160)">
      <circle r="18" fill="url(#bgGrad)" stroke="#fb923c" stroke-width="2" filter="url(#glowOrange)"/>
      <!-- User Profile Icon inside -->
      <circle cx="0" cy="-3" r="4.5" fill="none" stroke="#fb923c" stroke-width="1.5" />
      <path d="M -7 7 A 7 7 0 0 1 7 7" fill="none" stroke="#fb923c" stroke-width="1.5" />
      <text x="0" y="32" fill="#cbd5e1" font-size="10" text-anchor="middle">Human Core</text>
    </g>

    <!-- 4. Workflow Node -->
    <g transform="translate(75, 250)">
      <circle r="18" fill="url(#bgGrad)" stroke="#a855f7" stroke-width="2" />
      <!-- Workflow Cycle Icon inside -->
      <path d="M -5 -2 A 6 6 0 1 1 5 4" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" />
      <polygon points="5,1 5,6 0,5" fill="#a855f7" />
      <text x="0" y="32" fill="#cbd5e1" font-size="10" text-anchor="middle">Workflows</text>
    </g>

    <!-- 5. Goals/OKRs Node -->
    <g transform="translate(170, 250)">
      <circle r="18" fill="url(#bgGrad)" stroke="#34d399" stroke-width="2" filter="url(#glowEmerald)"/>
      <!-- Target/Bullseye Icon inside -->
      <circle cx="0" cy="0" r="7" fill="none" stroke="#34d399" stroke-width="1.5" />
      <circle cx="0" cy="0" r="2" fill="#34d399" />
      <text x="0" y="32" fill="#cbd5e1" font-size="10" text-anchor="middle">OKRs / Goals</text>
    </g>

    <!-- Interactive Bottleneck Alert Badge -->
    <g transform="translate(130, 160)">
      <rect x="-40" y="-10" width="80" height="20" rx="4" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" />
      <text x="0" y="4" fill="#fca5a5" font-size="9.5" font-weight="700" text-anchor="middle" letter-spacing="0.3">⚠ SLA EXCEEDED</text>
    </g>
  </g>

  <!-- Central Connecting Divider -->
  <line x1="400" y1="60" x2="400" y2="340" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4" />
</svg>
